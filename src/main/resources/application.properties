server.port=8081

# URL EM UMA LINHA Sė - SEM QUEBRAS
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SysB;encrypt=true;trustServerCertificate=true

# Credenciais (Tente 'sa' se 'root' falhar)
spring.datasource.username=sa
spring.datasource.password=12345678

# Configurań§es JPA/Hibernate
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl