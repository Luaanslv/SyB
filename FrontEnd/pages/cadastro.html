<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/output.css" rel="stylesheet">
    <title>Cadastro</title>
</head>
    <body class="min-h-screen flex items-center justify-center bg-[#f0f0f0]">

        <div class="bg-[#d1d1d1] rounded-2xl shadow-lg p-10 w-full max-w-sm">

            <!-- Logo -->
            <div class="flex flex-col items-center mb-6">
                <img src="../resources/imgs/logo.png" alt="SYB Logo" class="w-80 mb-2">
            </div>

            <p id="erro" class="text-red-500 text-center"></p>
            
            <h2 class="text-[#1a1a1a] text-xl font-bold mb-4">Cadastro</h2>

            <div class="flex flex-col gap-3">

                <input type="text" placeholder="Nome completo" id="nome"
                    class="w-full rounded-md border border-gray-400 bg-white/50 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-[#4a7fa5] focus:ring-1 focus:ring-[#4a7fa5] transition" />

                <input type="email" placeholder="E-mail" id="email"
                    class="w-full rounded-md border border-gray-400 bg-white/50 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-[#4a7fa5] focus:ring-1 focus:ring-[#4a7fa5] transition" />

                <input type="text" placeholder="CPF" maxlength="14" id="cpf"
                    class="w-full rounded-md border border-gray-400 bg-white/50 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-[#4a7fa5] focus:ring-1 focus:ring-[#4a7fa5] transition" />

                <input type="password" placeholder="Senha" id="senha"
                    class="w-full rounded-md border border-gray-400 bg-white/50 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-[#4a7fa5] focus:ring-1 focus:ring-[#4a7fa5] transition" />

                <input type="password" placeholder="Confirmar senha" id="confirmar-senha"
                    class="w-full rounded-md border border-gray-400 bg-white/50 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-[#4a7fa5] focus:ring-1 focus:ring-[#4a7fa5] transition" />

                <button onclick="realizarCadastro(event)"
                    class="mt-2 w-full bg-[#3B67BF] hover:bg-[#4178BF] text-white font-bold py-2.5 rounded-md transition-colors duration-200 text-sm tracking-wide cursor-pointer">
                    Cadastrar
                </button>

            </div>

            <!-- Login link -->
            <p class="text-center text-sm text-gray-700 font-semibold mt-5">
                Já possui conta?
                <a href="../pages/login.html" class="text-[#3B67BF] hover:underline font-semibold ml-1">Entrar agora</a>
            </p>

        </div>

        <script src="../script/cadastro.js"></script>
    </body>

    </html>
